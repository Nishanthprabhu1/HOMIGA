<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Explore Korea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
:root{--ink:#080604;--paper:#F0E8D5;--gold:#B8973A;--gold2:#D4AE52;--ff-en:'Cormorant Garamond',Georgia,serif;--ff-ui:'DM Sans',Arial,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--paper);font-family:var(--ff-ui);height:100svh;overflow:hidden;display:flex;flex-direction:column}
.back-btn{position:fixed;left:16px;top:max(env(safe-area-inset-top),14px);z-index:100;text-decoration:none;color:var(--paper);background:rgba(255,255,255,.08);padding:10px 16px;border-radius:30px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(12px);font-size:11px}
.nav-header{padding:max(env(safe-area-inset-top),20px) 20px 16px;text-align:center;border-bottom:1px solid rgba(184,151,58,.2)}
.nav-header h1{font-family:var(--ff-en);font-size:clamp(28px,6vw,40px);color:var(--gold2);letter-spacing:.08em}
.nav-header p{margin-top:6px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;opacity:.6}
.explorer-grid{flex:1;display:flex;align-items:center;gap:18px;padding:20px 16px;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;scrollbar-width:none;touch-action:pan-x}
.explorer-grid::-webkit-scrollbar{display:none}
.landmark-card{flex:0 0 min(85vw,360px);height:min(64vh,540px);background:#0f0c09;border:1px solid rgba(184,151,58,.25);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;scroll-snap-align:center}
.model-wrap{flex:1;position:relative;overflow:hidden;background:radial-gradient(circle at center,#1b160c 0%,#080604 100%)}
.model-poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;transition:opacity .45s}
.model-wrap:not(.active) .model-poster{opacity:1}
.model-wrap.active .model-poster{opacity:0}
model-viewer{position:absolute;inset:0;width:100%;height:100%;z-index:3;opacity:0;pointer-events:none;transition:opacity .4s;background:transparent;--poster-color:transparent;touch-action:none}
model-viewer::part(default-progress-bar){display:none}
.model-wrap.active model-viewer{opacity:1;pointer-events:auto}

/* ── AR FULLSCREEN OVERLAY ── */
#ar-screen{display:none;position:fixed;inset:0;z-index:9999;background:transparent;pointer-events:none}
#ar-screen.active{display:block}
#ar-mv-fullscreen{position:absolute;inset:0;width:100%;height:100%;background:transparent;--poster-color:transparent;touch-action:none}
#ar-mv-fullscreen::part(default-progress-bar){display:none}

/* Inject capture button INTO model-viewer's AR button slot */
#ar-mv-fullscreen::part(ar-button){display:none} /* hide default AR button */

/* ── SHADOW DOM INJECTED CAPTURE BUTTON STYLES (applied via JS) ── */

/* close AR */
#ar-close-btn{
  position:absolute;top:max(env(safe-area-inset-top,16px),20px);right:20px;
  width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.55);
  border:2px solid rgba(255,255,255,.6);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:auto;z-index:10;-webkit-tap-highlight-color:transparent;
}

/* flash */
#ar-flash{display:none;position:fixed;inset:0;z-index:2147483646;background:#fff;pointer-events:none}
#ar-flash.fire{display:block;animation:flashAnim .4s ease forwards}
@keyframes flashAnim{0%{opacity:.95}100%{opacity:0}}

/* toast */
#ar-toast{
  position:fixed;top:max(env(safe-area-inset-top),64px);left:50%;
  transform:translateX(-50%) translateY(-10px);z-index:2147483647;
  background:rgba(8,6,4,.92);border:1px solid rgba(184,151,58,.45);
  color:var(--gold2);padding:10px 22px;border-radius:30px;font-size:11px;
  letter-spacing:.15em;text-transform:uppercase;opacity:0;pointer-events:none;
  backdrop-filter:blur(14px);transition:opacity .25s,transform .25s;white-space:nowrap
}
#ar-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* cards */
.ar-badge{position:absolute;right:12px;top:12px;z-index:8;padding:6px 12px;border-radius:30px;font-size:9px;background:rgba(8,6,4,.8);border:1px solid var(--gold);color:var(--gold2);opacity:0;transform:translateY(-6px);transition:opacity .35s,transform .35s;pointer-events:none}
.ar-badge.visible{opacity:1;transform:translateY(0)}
.capture-btn{position:absolute;bottom:18px;right:18px;z-index:20;width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,.85);background:rgba(20,16,10,.55);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:all .3s}
.model-wrap.active .capture-btn{opacity:1;pointer-events:auto}
.capture-btn:active{transform:scale(.88)}
.capture-btn svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.shutter-flash{position:absolute;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;border-radius:18px}
.shutter-flash.fire{animation:sFlash .38s ease forwards}
@keyframes sFlash{0%{opacity:.75}100%{opacity:0}}
.pinch-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:9;background:rgba(8,6,4,.8);border:1px solid rgba(184,151,58,.35);padding:7px 14px;border-radius:30px;font-size:9px;letter-spacing:.12em;color:var(--gold2);white-space:nowrap;pointer-events:none;opacity:0}
.model-wrap.active .pinch-hint{opacity:1;animation:fo 4s ease 2.5s forwards}
@keyframes fo{to{opacity:0}}
.loading-overlay{position:absolute;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(8,6,4,.8);pointer-events:none}
.loading-overlay.show{display:flex}
.loader-ring{width:42px;height:42px;border-radius:50%;border:2px solid rgba(184,151,58,.15);border-top-color:var(--gold2);animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-bar-track{width:110px;height:3px;background:rgba(184,151,58,.18);border-radius:10px;overflow:hidden}
.loader-bar-fill{height:100%;width:0%;background:var(--gold2);transition:width .1s linear}
.loader-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper)}
.error-overlay{position:absolute;inset:0;z-index:11;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(8,6,4,.75)}
.error-overlay.show{display:flex}
.error-icon{font-size:28px;opacity:.5}
.error-msg{font-size:9px;letter-spacing:.16em;text-transform:uppercase;opacity:.55;text-align:center;padding:0 20px}
.retry-btn{background:rgba(184,151,58,.15);border:1px solid rgba(184,151,58,.4);color:var(--gold2);border-radius:30px;padding:8px 20px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
.landmark-info{padding:16px;background:#11100d}
.landmark-name{font-family:var(--ff-en);font-size:28px;margin-bottom:4px}
.landmark-city{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.btn-row{display:flex;gap:8px}
.action-btn{border:none;border-radius:10px;padding:13px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;min-height:46px;cursor:pointer;transition:opacity .2s,background .2s}
.action-btn:disabled{opacity:.4;cursor:not-allowed}
.btn-3d{background:rgba(184,151,58,.14);color:var(--gold2);border:1px solid rgba(184,151,58,.35)}
.btn-3d.is-active{background:rgba(184,151,58,.28)}
.btn-ar{flex:1;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;position:relative;overflow:hidden}
.btn-ar::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.25);opacity:0;transition:opacity .18s}
.btn-ar:hover::before{opacity:1}
.btn-ar.loading{background:rgba(184,151,58,.18);color:var(--gold2);border:1px solid rgba(184,151,58,.3)}
.btn-ar.error{background:rgba(184,151,58,.1);color:rgba(212,174,82,.4);border:1px solid rgba(184,151,58,.2)}
.scroll-dots{display:flex;justify-content:center;gap:8px;padding:12px 0 max(env(safe-area-inset-bottom),14px)}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(184,151,58,.25);transition:transform .2s,background .2s}
.dot.active{background:var(--gold2);transform:scale(1.35)}
</style>
</head>
<body>

<a href="FunZone.html" class="back-btn">← Back</a>
<header class="nav-header">
  <h1>Explore Korea</h1>
  <p>Augmented Reality Landmarks</p>
</header>
<div class="explorer-grid" id="grid"></div>
<div class="scroll-dots" id="dots"></div>

<!-- AR overlay — model-viewer + close btn only -->
<div id="ar-screen">
  <model-viewer
    id="ar-mv-fullscreen"
    ar
    ar-modes="webxr"
    ar-placement="floor"
    ar-scale="auto"
    camera-controls
    xr-environment
    touch-action="none">

    <!-- SLOT: our capture button lives INSIDE model-viewer's ar-button slot
         model-viewer renders slot[slot="ar-button"] inside its own XR layer -->
    <div slot="ar-button" id="ar-capture-wrap">
      <button id="ar-capture-btn" aria-label="Capture AR photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="38" height="38">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <span id="ar-capture-label">Capture</span>
    </div>

  </model-viewer>
  <button id="ar-close-btn" aria-label="Close AR">✕</button>
</div>

<div id="ar-flash"></div>
<div id="ar-toast"></div>

<!-- Scoped styles for the slotted capture button -->
<style>
#ar-capture-wrap{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,28px),52px);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:9px;
  z-index:2147483647;
  pointer-events:auto;
}
#ar-capture-btn{
  width:86px;height:86px;
  border-radius:50%;
  border:4px solid #fff;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:
    0 0 0 6px rgba(255,255,255,.25),
    0 0 0 13px rgba(255,255,255,.1),
    0 8px 40px rgba(0,0,0,.85);
  animation:capPulse 2s ease-in-out infinite;
  transition:transform .12s;
  padding:0;
}
#ar-capture-btn:active{transform:scale(.84);animation:none}
@keyframes capPulse{
  0%,100%{box-shadow:0 0 0 6px rgba(255,255,255,.25),0 0 0 13px rgba(255,255,255,.1),0 8px 40px rgba(0,0,0,.85)}
  50%    {box-shadow:0 0 0 11px rgba(255,255,255,.38),0 0 0 22px rgba(255,255,255,.15),0 8px 40px rgba(0,0,0,.85)}
}
#ar-capture-label{
  font-family:'DM Sans',Arial,sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:.25em;text-transform:uppercase;
  color:#fff;
  text-shadow:0 1px 12px #000,0 0 28px #000;
}
</style>

<script>
const LANDMARKS=[
  {name:'Cheonchuksa Temple',city:'Korea',folder:'Cheonchuksa_Temple',file:'Cheonchuksa_Temple',arScale:.5,orbit:'30deg 65deg 110%'},
  {name:'Seokguram Temple',  city:'Korea',folder:'Seokguram_Temple',  file:'Seokguram_Temple',  arScale:.5,orbit:'20deg 60deg 105%'},
  {name:'Seoul Tower',       city:'Korea',folder:'seoul_tower',       file:'seoul_tower',       arScale:.5,orbit:'0deg 55deg 105%'},
  {name:'Traditional Bridge',city:'Korea',folder:'traditional_bridge',file:'traditional_bridge',arScale:.5,orbit:'15deg 60deg 110%'},
];

const IS_IOS=/iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

const arScreen   = document.getElementById('ar-screen');
const arMvFS     = document.getElementById('ar-mv-fullscreen');
const arCapBtn   = document.getElementById('ar-capture-btn');
const arCloseBtn = document.getElementById('ar-close-btn');
const arFlash    = document.getElementById('ar-flash');
const arToast    = document.getElementById('ar-toast');
const grid       = document.getElementById('grid');
const dotsEl     = document.getElementById('dots');

let currentLandmark = null;
let toastTimer = null;

function showToast(msg,ms=3000){
  if(toastTimer)clearTimeout(toastTimer);
  arToast.textContent=msg;arToast.classList.add('show');
  toastTimer=setTimeout(()=>arToast.classList.remove('show'),ms);
}
function doFlash(){arFlash.classList.remove('fire');void arFlash.offsetWidth;arFlash.classList.add('fire')}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`${name}-AR-${Date.now()}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

/* ── Launch AR ── */
function launchAR(lm){
  currentLandmark=lm;
  const base=`./ExploreKorea/${lm.folder}/${lm.file}`;
  const s=(lm.arScale||1).toFixed(6);
  arMvFS.setAttribute('src',`${base}.glb`);
  if(IS_IOS)arMvFS.setAttribute('ios-src',`${base}.usdz`);
  arMvFS.setAttribute('scale',`${s} ${s} ${s}`);
  arMvFS.setAttribute('camera-orbit',lm.orbit);
  arScreen.classList.add('active');
  document.body.style.overflow='hidden';

  arMvFS.addEventListener('load',function onLoad(){
    arMvFS.removeEventListener('load',onLoad);
    try{arMvFS.activateAR();}catch(e){console.warn('activateAR:',e);}
  },{once:true});
}

function closeAR(){
  arScreen.classList.remove('active');
  document.body.style.overflow='';
  arMvFS.removeAttribute('src');
  currentLandmark=null;
}

arCloseBtn.addEventListener('click',closeAR);

/* Listen for ar-status to know when we're truly IN the AR session */
arMvFS.addEventListener('ar-status',e=>{
  console.log('ar-status:',e.detail.status);
});

/* ── Capture ── */
arCapBtn.addEventListener('click',async()=>{
  doFlash();
  if(typeof arMvFS.captureImage==='function'){
    try{
      const blob=await arMvFS.captureImage();
      downloadBlob(blob,currentLandmark?.name||'AR');
      showToast('✦ Photo saved!');
      return;
    }catch(e){}
  }
  try{
    const sr=arMvFS.shadowRoot;
    const canvas=sr&&(sr.querySelector('canvas[aria-hidden]')||sr.querySelector('canvas'));
    if(canvas&&canvas.width>0){
      canvas.toBlob(blob=>{
        if(blob){downloadBlob(blob,currentLandmark?.name||'AR');showToast('✦ Photo saved!');}
        else showToast('📸 Use hardware screenshot button');
      },'image/png');
      return;
    }
  }catch(e){}
  showToast(IS_IOS?'📸 Side + Volume Up':'📸 Volume Down + Power',4000);
});

/* ── Build cards ── */
LANDMARKS.forEach((lm,idx)=>{
  const base=`./ExploreKorea/${lm.folder}/${lm.file}`;
  const s=(lm.arScale||1).toFixed(6);

  const card=document.createElement('div');
  card.className='landmark-card';card.dataset.idx=idx;
  card.innerHTML=`
    <div class="model-wrap" id="wrap-${idx}">
      <img class="model-poster" src="${base}.png" alt="${lm.name}"
           ${idx===0?'loading="eager" fetchpriority="high"':'loading="lazy"'}
           decoding="async" onerror="this.style.opacity='.1'">
      <model-viewer id="mv-${idx}"
        src="${base}.glb"
        camera-controls interaction-prompt="auto" interaction-prompt-style="wiggle"
        min-camera-orbit="auto auto 40%" max-camera-orbit="auto auto 900%"
        min-field-of-view="20deg" max-field-of-view="90deg"
        touch-action="none"
        camera-orbit="${lm.orbit}"
        scale="${s} ${s} ${s}"
        style="touch-action:none;--poster-color:transparent">
      </model-viewer>
      <div class="shutter-flash" id="flash-${idx}"></div>
      <div class="loading-overlay show" id="loader-${idx}">
        <div class="loader-ring"></div>
        <div class="loader-bar-track"><div class="loader-bar-fill" id="bar-${idx}"></div></div>
        <div class="loader-label" id="lbl-${idx}">Loading model…</div>
      </div>
      <div class="error-overlay" id="err-${idx}">
        <div class="error-icon">⚠︎</div>
        <div class="error-msg" id="errmsg-${idx}">Model unavailable</div>
        <button class="retry-btn" id="retry-${idx}">↺ Retry</button>
      </div>
      <div class="ar-badge" id="badge-${idx}">✦ AR Ready</div>
      <button class="capture-btn" id="capture-${idx}" aria-label="Screenshot 3D">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <div class="pinch-hint">⟺ Pinch to Scale · Drag to Rotate</div>
    </div>
    <div class="landmark-info">
      <div class="landmark-name">${lm.name}</div>
      <div class="landmark-city">${lm.city}</div>
      <div class="btn-row">
        <button class="action-btn btn-3d" id="btn3d-${idx}">⬡ 3D</button>
        <button class="action-btn btn-ar loading" id="btnar-${idx}" disabled>⏳ Loading…</button>
      </div>
    </div>`;
  grid.appendChild(card);

  const dot=document.createElement('div');
  dot.className='dot'+(idx===0?' active':'');
  dotsEl.appendChild(dot);

  const mv      =card.querySelector(`#mv-${idx}`);
  const loader  =card.querySelector(`#loader-${idx}`);
  const bar     =card.querySelector(`#bar-${idx}`);
  const lbl     =card.querySelector(`#lbl-${idx}`);
  const errBox  =card.querySelector(`#err-${idx}`);
  const errmsg  =card.querySelector(`#errmsg-${idx}`);
  const retryBtn=card.querySelector(`#retry-${idx}`);
  const badge   =card.querySelector(`#badge-${idx}`);
  const wrap    =card.querySelector(`#wrap-${idx}`);
  const btn3d   =card.querySelector(`#btn3d-${idx}`);
  const capBtn  =card.querySelector(`#capture-${idx}`);
  const flashEl =card.querySelector(`#flash-${idx}`);
  const btnAR   =card.querySelector(`#btnar-${idx}`);
  let modelReady=false;

  mv.addEventListener('progress',e=>{
    const pct=Math.round((e.detail.totalProgress||0)*100);
    bar.style.width=pct+'%';lbl.textContent=`Loading ${pct}%`;
  });
  mv.addEventListener('load',()=>{
    modelReady=true;
    loader.classList.remove('show');errBox.classList.remove('show');
    badge.classList.add('visible');
    btnAR.disabled=false;btnAR.classList.remove('loading','error');
    btnAR.textContent='🪐 View in Real World';
  });
  mv.addEventListener('error',()=>{
    modelReady=false;loader.classList.remove('show');
    fetch(`${base}.glb`,{method:'HEAD'})
      .then(r=>{errmsg.textContent=r.ok?'File may be corrupted':`Not found (${r.status})`;})
      .catch(()=>{errmsg.textContent='Use localhost, not file://';});
    errBox.classList.add('show');
    btnAR.disabled=true;btnAR.classList.remove('loading');btnAR.classList.add('error');
    btnAR.textContent='⚠ Unavailable';
  });
  retryBtn.addEventListener('click',()=>{
    errBox.classList.remove('show');btnAR.disabled=true;
    btnAR.classList.remove('error');btnAR.classList.add('loading');
    btnAR.textContent='⏳ Loading…';loader.classList.add('show');
    bar.style.width='0%';lbl.textContent='Loading model…';
    const src=mv.getAttribute('src');mv.removeAttribute('src');
    requestAnimationFrame(()=>mv.setAttribute('src',src));
  });
  btn3d.addEventListener('click',()=>{
    const a=wrap.classList.toggle('active');
    btn3d.classList.toggle('is-active',a);
    btn3d.textContent=a?'✕ 2D':'⬡ 3D';
  });
  capBtn.addEventListener('click',async()=>{
    flashEl.classList.remove('fire');void flashEl.offsetWidth;flashEl.classList.add('fire');
    try{
      const sr=mv.shadowRoot;
      const c=sr&&(sr.querySelector('canvas[aria-hidden]')||sr.querySelector('canvas'));
      if(!c||c.width===0)throw 0;
      c.toBlob(b=>{if(b){downloadBlob(b,lm.name);showToast('✦ 3D snapshot saved');}else showToast('⚠ Failed');},'image/png');
    }catch{showToast('⚠ Screenshot unavailable');}
  });
  btnAR.addEventListener('click',()=>{
    if(!modelReady||btnAR.disabled)return;
    launchAR(lm);
  });
  wrap.addEventListener('touchstart',e=>{
    if(wrap.classList.contains('active')&&e.touches.length>1)e.stopPropagation();
  },{passive:true});
});

/* scroll dots */
const allDots=dotsEl.querySelectorAll('.dot');
let raf=false;
grid.addEventListener('scroll',()=>{
  if(raf)return;raf=true;
  requestAnimationFrame(()=>{
    raf=false;
    const cx=grid.scrollLeft+grid.clientWidth/2;
    let best=0,bd=Infinity;
    grid.querySelectorAll('.landmark-card').forEach((c,ci)=>{
      const d=Math.abs(c.offsetLeft+c.offsetWidth/2-cx);
      if(d<bd){bd=d;best=ci;}
    });
    allDots.forEach((d,di)=>d.classList.toggle('active',di===best));
  });
},{passive:true});
</script>
</body>
</html>
